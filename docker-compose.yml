services:
  bike-mining:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: bike_mining_app
    ports:
      - "8200:8200"
    restart: unless-stopped
    environment:
      - STREAMLIT_SERVER_HEADLESS=true
      - STREAMLIT_BROWSER_GATHER_USAGE_STATS=false
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8200/_stcore/health')"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 20s
